<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Async Weather Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>☀ Async Weather Tracker</h1>

    <div class="main">

        <!-- LEFT PANEL -->
        <div class="card">

            <h3>Search City</h3>

            <div class="searchBox">
                <input type="text" id="cityInput" placeholder="Enter city name">
                <button onclick="searchWeather()">Search</button>
            </div>

            <h3>Search History</h3>
            <div id="history"></div>

        </div>


        <!-- RIGHT PANEL -->
        <div class="card">

            <h3>Weather Info</h3>

            <div id="weather">
                <p>No data</p>
            </div>

        </div>

    </div>


    <!-- CONSOLE PANEL -->
    <div class="consoleCard">

        <h3>Console – Event Loop</h3>

        <pre id="consoleBox"></pre>

    </div>

    <script src="script.js"></script>

</body>

</html>
